name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLAUDE_APP_ID: op://FR Claude Bot/CLAUDE_APP_ID/password
          CLAUDE_APP_PRIVATE_KEY: op://FR Claude Bot/CLAUDE_APP_PRIVATE_KEY/notesPlain

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ env.CLAUDE_APP_ID }}
          private-key: ${{ env.CLAUDE_APP_PRIVATE_KEY }}

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          track_progress: true
          use_sticky_comment: true
          additional_permissions: |
            actions: read
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            ## Instructions
            Review this pull request. Your detailed analysis will be captured in the progress tracking comment, so focus your output there.

            ## Review Criteria
            Analyze the PR for:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful.

            Use `mcp__github_inline_comment__create_inline_comment` for specific code issues.

            ## Output Format
            Provide your full detailed analysis as your regular output (this will appear in the progress comment).

            ## Final Step: Submit Review Decision
            After your analysis, check CI status and submit a **brief** formal review using ONE of these commands:

            - If NO critical issues AND CI passing:
              `gh pr review ${{ github.event.pull_request.number }} --approve --body "LGTM - No issues found."`
            - If critical issues OR CI failing:
              `gh pr review ${{ github.event.pull_request.number }} --request-changes --body "See review comments above for details."`
            - For minor non-blocking suggestions only:
              `gh pr review ${{ github.event.pull_request.number }} --comment --body "Minor suggestions - see comments above."`

            IMPORTANT: Keep the --body brief (one sentence). Your detailed analysis is already in the progress comment - don't repeat it in the formal review.
          claude_args: '--allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh pr review:*)"'
